<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Profile Finder</title>
    <style>
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
    }

    h1 {
      font-size: 2rem;
      color: #58a6ff;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: #8b949e;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    input {
      padding: 12px 20px;
      width: 280px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #161b22;
      color: white;
      font-size: 15px;
      outline: none;
    }

    input:focus { 
        border-color: #58a6ff; 
    }

    button {
      padding: 12px 24px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover { 
        background: #2ea043; 
    }

    #loading {
      display: none;
      color: #58a6ff;
      font-size: 16px;
      margin-bottom: 20px;
    }

    #error {
      display: none;
      color: #f85149;
      font-size: 16px;
      margin-bottom: 20px;
    }

    #card {
      display: none;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    #card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid #58a6ff;
    }

    #card h2 { font-size: 1.4rem; 
        color: white; 
        margin-bottom: 5px; 
    }
    #card p.username { color: #58a6ff; 
        margin-bottom: 10px; 
    }
    #card p.bio { color: #8b949e; 
        margin-bottom: 20px; 
        font-size: 14px; 
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
    }

    .stat { 
        text-align: center; 
    }
    .stat span { 
        display: block;
        font-size: 1.3rem;
        color: white;
        font-weight: bold; 
        }
    .stat small { 
        color: #8b949e;
        font-size: 12px; 
    }

    a.profile-btn {
      display: inline-block;
      padding: 10px 24px;
      background: #238636;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    a.profile-btn:hover { 
      background: #2ea043; 
    }
    </style>
</head>
<body>
    <h1>Github Profile Finder</h1>
    <div class="search-box">
    <input type="text" id="username" placeholder="Enter Github username">
    <button onclick="searchUser()">Search</button><br><br>
</div>
<div id="loading">Fetching profile...</div>
<div id="error">Error! User not found.</div>
<div id="card">
    <img id="avatar" src="" alt="Avatar">
    <h2 id="name"></h2> 
    <p class="username" id="login"></p>
    <p id="bio"></p>
    <div class="stats">
        <div class="stat">
            <h3 id="repos"></h3>
            <p>Repos</p>
            </div>
        <div class="stat">
            <span id="followers"></span>
            <p>Followers</p>
        </div>
        <div class="stat">
            <span id="following"></span>
            <p>Following</p>
        </div>
    </div>
    <a class="profile-btn" id="profile-link" href="" target="_blank">View Profile on Github</a>
</div>
<script>
    async function searchUser() {
        const username= document.getElementById('username').value.trim();
        document.getElementById('loading').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('card').style.display = 'none';
        if(!username){
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
       document.getElementById('error').textContent = 'Please enter a username!';
        return;
    }
    try{
        const response = await fetch(`https://api.github.com/users/${username}`);
        document.getElementById('loading').style.display = 'none';
        if(!response.ok){
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'User not found!';
            return;
        }
        const data=await response.json();
        document.getElementById('avatar').src = data.avatar_url;
        document.getElementById('name').textContent = data.name || 'No name provided';
        document.getElementById('login').textContent = '@' + data.login;
        document.getElementById('bio').textContent = data.bio || 'No bio provided';
        document.getElementById('repos').textContent = data.public_repos;
        document.getElementById('followers').textContent = data.followers;
        document.getElementById('following').textContent = data.following;
        document.getElementById('profile-link').href = data.html_url;
        document.getElementById('card').style.display = 'block';
    }
    catch(error){
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'An error occurred. Please try again.';   
    }
}
    document.getElementById('username').addEventListener('keypress', function(e){
        if(e.key === 'Enter')
            searchUser(); 
    });
</script>
</body>
</html>
