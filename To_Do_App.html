<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow </title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --card: #222;
      --border: #2e2e2e;
      --accent: #a78bfa;
      --accent2: #7c3aed;
      --text: #f1f0ff;
      --muted: #888;
      --done-bg: #1a1a2e;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* HEADER */
    .header {
      max-width: 640px;
      margin: 0 auto 2.5rem;
    }
    .header h1 {
      font-family: var(--font-head);
      font-size: 2.6rem;
      letter-spacing: -1px;
      line-height: 1;
    }
    .header h1 span { color: var(--accent); }
    .header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* STATS BAR */
    .stats {
      max-width: 640px;
      margin: 0 auto 1.8rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .stat strong { color: var(--accent); font-size: 1rem; margin-right: 0.3rem; }

    /* INPUT */
    .input-row {
      max-width: 640px;
      margin: 0 auto 2rem;
      display: flex;
      gap: 0.7rem;
    }
    .input-row input {
      flex: 1;
      padding: 0.85rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }
    .input-row button {
      padding: 0.85rem 1.5rem;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .input-row button:hover { background: #c4b5fd; transform: translateY(-1px); }
    .input-row button:active { transform: scale(0.97); }

    /* FILTER TABS */
    .filters {
      max-width: 640px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: 0.5rem;
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
      font-weight: 500;
    }

    /* TASK LIST */
    .task-list {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      animation: slideIn 0.25s ease;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .task-item:hover { border-color: #444; }
    .task-item.done {
      background: var(--done-bg);
      opacity: 0.6;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CHECKBOX */
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      font-size: 0.75rem;
      color: transparent;
    }
    .check-btn:hover { border-color: var(--accent); color: var(--accent); }
    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
    }

    /* TEXT */
    .task-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      transition: all 0.2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* TIMESTAMP */
    .task-time {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* DELETE */
    .del-btn {
      background: none;
      border: none;
      color: #444;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .del-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 4rem 0;
      font-size: 0.95rem;
    }
    .empty span { display: block; font-size: 2.5rem; margin-bottom: 0.8rem; }

    /* CLEAR DONE */
    .bottom-bar {
      max-width: 640px;
      margin: 1.5rem auto 0;
      display: flex;
      justify-content: flex-end;
    }
    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #f87171; color: #f87171; }

    @media (max-width: 480px) {
      .header h1 { font-size: 2rem; }
      .task-time { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Task<span>Flow</span></h1>
    <p>Streamline your workflow with us.</p>
  </div>
  <div class="stats">
    <div class="stat">
    <strong id="totalCount">0</strong> Total Tasks
    </div>
    <div class="stat">
      <strong id="completedCount">0</strong> Tasks Completed
    </div>
    <div class="stat">
      <strong id="leftCount">0</strong> Remaining Tasks
    </div>
     </div>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <button onclick="addTask()">Add Task</button>
    </div>
    <div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
</div>
    <div class="task-list" id="taskList"></div>
    <div class="bottom-bar">
      <button class="clear-btn" onclick="clearAll()">Clear All Completed Tasks</button>
    </div>
 <script>
  let tasks= JSON.parse(localStorage.getItem('taskflow_tasks')) || [];
  let filter='all';
  function saveTasks(){
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }
  function addTask(){
    const input=document.getElementById('taskInput');
    const text=input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, completed: false, timestamp: new Date().toISOString() });
    input.value='';
    saveTasks();
    renderTasks();
  }
  function toggleTask(id){
    tasks=tasks.map(task=> task.id===id ? {...task, completed: !task.completed} : task);
    saveTasks();
    renderTasks();
  }
  function deleteTask(id){
    tasks=tasks.filter(task=> task.id!==id);
    saveTasks();
    renderTasks();
  }
  function clearAll(){
    if (confirm('Are you sure you want to clear all completed tasks?')) {
      tasks= tasks.filter(task=> !task.completed);
      saveTasks();
      renderTasks();
    }
  }
    function setFilter(val, btn){
      filter=val;
      document.querySelectorAll('.filter-btn').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }
    function renderTasks(){
      const taskList=document.getElementById('taskList');
      const list = document.getElementById('taskList');

    // Update stats
    const total = tasks.length;
    const done  = tasks.filter(t => t.completed).length;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('completedCount').textContent  = done;
    document.getElementById('leftCount').textContent  = total - done;

    // Filter
    let visible = tasks;
    if (filter === 'active') visible = tasks.filter(t => !t.completed);
    if (filter === 'done')   visible = tasks.filter(t => t.completed);

    // Empty state
    if (visible.length === 0) {
      const msgs = {
        all:    'No tasks yet. Add one above!',
        active: 'Nothing left to do. Great job!',
        done:   'No completed tasks yet.'
      };
      list.innerHTML = `<div class="empty">${msgs[filter]}</div>`;
      return;
    }

    // Build HTML
    list.innerHTML = visible.map(t => `
      <div class="task-item ${t.completed ? 'done' : ''}" id="task-${t.id}">
        <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <span class="task-time">${new Date(t.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    `).join('');
  } 
  function escapeHtml(text) {
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
  }
  
  renderTasks();

 </script>
</body>
</html>
